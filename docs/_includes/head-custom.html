<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<style>
  /* Warm light background — "For Dummies" feel */
  body {
    background: #f7f7f7;
    font-size: 16px;
    line-height: 1.7;
  }

  /* Wider content area */
  .container-lg {
    max-width: 960px !important;
  }

  /* Code blocks — subtle, clean, no frills */
  pre, code, .highlight, .highlighter-rouge {
    font-family: "SF Mono", "Cascadia Code", "JetBrains Mono", "Fira Code", "Consolas", monospace !important;
    font-size: 0.93em;
  }

  .highlight pre, .highlighter-rouge .highlight, pre {
    background: #ececec !important;
    color: #474747;
    padding: 14px 18px;
    line-height: 1.5;
  }

  /* Inline code — same color family */
  code:not(pre code) {
    background: #ececec;
    color: #474747;
    padding: 2px 6px;
  }

  /* Headings — dark charcoal */
  h1, h2, h3, h4 {
    color: #393e46;
  }

  h2 {
    margin-top: 32px;
    padding-bottom: 6px;
    border-bottom: 1px solid #e0e0e0;
  }

  h3 {
    margin-top: 24px;
  }

  /* Links — warm yellow accent */
  a {
    color: #e8a800;
    text-decoration: none;
  }
  a:hover {
    color: #d09000;
    text-decoration: underline;
  }
  a:visited {
    color: #d09000;
  }

  /* Blockquotes — terminal-style dark background */
  .markdown-body blockquote {
    border-left: 6px solid #d4763a;
    color: #c0c0c0;
    background: #474747;
    padding: 10px 1em;
    border-radius: 0 6px 6px 0;
  }
  .markdown-body blockquote ul {
    list-style: square;
    padding-left: 1.2em;
  }

  /* Tables — clean and simple */
  table {
    border-collapse: collapse;
    width: 100%;
  }
  th, td {
    padding: 8px 12px;
    border: 1px solid #e0e0e0;
  }
  th {
    background: #f0f0f0;
    font-weight: 600;
  }
  tr:nth-child(even) {
    background: #fafafa;
  }

  /* Lists — square bullets everywhere */
  ul {
    list-style: square;
  }
  li {
    margin-bottom: 4px;
  }

  /* Task list checkboxes */
  .task-list-item {
    list-style: none;
  }
  .task-list-item input[type="checkbox"] {
    margin-right: 6px;
  }

  /* Site footer */
  .site-footer {
    display: flex;
    justify-content: space-between;
    margin-top: 48px;
    padding: 16px 0;
    border-top: 1px solid #e0e0e0;
    font-size: 13px;
    color: #999;
  }
  .site-footer .date {
    color: #999;
  }

  /* Copy button on code blocks */
  .code-wrap {
    position: relative;
  }
  .copy-btn {
    position: absolute;
    top: 6px;
    right: 6px;
    background: #d0cec8;
    color: #474747;
    border: none;
    padding: 4px 6px;
    font-size: 12px;
    border-radius: 4px;
    cursor: pointer;
    opacity: 0.4;
    transition: opacity 0.2s;
  }
  .code-wrap:hover .copy-btn {
    opacity: 1;
  }
  .copy-btn:hover {
    background: #c0beb8;
  }
  .copy-btn.copied {
    background: #7aaa7a;
    color: #fff;
  }
</style>

<script>
document.addEventListener("DOMContentLoaded", function() {
  document.querySelectorAll(".markdown-body pre").forEach(function(pre) {
    var wrap = document.createElement("div");
    wrap.className = "code-wrap";
    pre.parentNode.insertBefore(wrap, pre);
    wrap.appendChild(pre);

    var btn = document.createElement("button");
    btn.className = "copy-btn";
    btn.innerHTML = '<span class="material-icons" style="font-size:14px">content_copy</span>';
    wrap.appendChild(btn);

    btn.addEventListener("click", function() {
      var text = pre.textContent;
      navigator.clipboard.writeText(text).then(function() {
        btn.innerHTML = '<span class="material-icons" style="font-size:14px">check</span>';
        btn.classList.add("copied");
        setTimeout(function() {
          btn.innerHTML = '<span class="material-icons" style="font-size:14px">content_copy</span>';
          btn.classList.remove("copied");
        }, 2000);
      });
    });
  });
});
</script>
