<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<style>
  /* Warm light background */
  body {
    background: #f7f7f7;
    font-size: 16px;
    line-height: 1.7;
    font-family: -apple-system, system-ui, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
  }

  h1, h2, h3, h4, h5, h6 {
    font-family: -apple-system, system-ui, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
  }

  /* Wider content area */
  .container-lg {
    max-width: 960px !important;
  }

  /* Code blocks - subtle, clean, no frills */
  pre, code, .highlight, .highlighter-rouge {
    font-family: "SF Mono", "Cascadia Code", "JetBrains Mono", "Fira Code", "Consolas", monospace !important;
    font-size: 0.93em;
  }

  .highlight pre, .highlighter-rouge .highlight, pre {
    background: #ececec !important;
    color: #474747;
    padding: 14px 18px;
    line-height: 1.5;
  }

  /* Inline code - same color family */
  code:not(pre code) {
    background: #ececec;
    color: #474747;
    padding: 2px 6px;
  }

  /* Headings - dark charcoal */
  h1, h2, h3, h4 {
    color: #393e46;
  }

  h2 {
    margin-top: 32px;
    padding-bottom: 6px;
    border-bottom: 1px solid #e0e0e0;
  }

  h3 {
    margin-top: 24px;
  }

  /* Links */
  a {
    color: #3085ee;
    text-decoration: none;
  }
  a:hover {
    color: #1a6bd4;
    text-decoration: underline;
  }
  a:visited {
    color: #1a6bd4;
  }

  /* Blockquotes */
  .markdown-body blockquote {
    border-left: 6px solid #3085ee;
    color: #c0c0c0;
    background: #3a414e;
    padding: 10px 1em;
    border-radius: 0 6px 6px 0;
  }
  .markdown-body blockquote ul {
    list-style: square;
    padding-left: 1.2em;
  }
  .markdown-body blockquote code:not(pre code) {
    background: #d4d4d4;
    color: #222;
  }

  /* Tables - clean and simple */
  table {
    border-collapse: collapse;
    width: 100%;
  }
  th, td {
    padding: 8px 12px;
    border: 1px solid #e0e0e0;
  }
  th {
    background: #f0f0f0;
    font-weight: 600;
  }
  tr:nth-child(even) {
    background: #fafafa;
  }

  /* Lists - square bullets everywhere */
  ul {
    list-style: square;
  }
  li {
    margin-bottom: 4px;
  }

  /* Task list checkboxes */
  .task-list-item {
    list-style: none;
  }
  .task-list-item input[type="checkbox"] {
    margin-right: 6px;
  }

  /* Site footer - full-width bar */
  .site-footer {
    margin: 48px 0 0;
    padding: 20px 0 0;
    background: #3085ee;
    font-size: 13px;
    color: #f7f7f7;
  }
  .site-footer .footer-inner {
    display: flex;
    justify-content: space-between;
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 16px;
  }
  .site-footer .date {
    color: #f7f7f7;
  }
  .site-footer a {
    color: #f7f7f7;
    text-decoration: none;
  }
  .site-footer a:hover {
    color: #e0e0e0;
    text-decoration: underline;
  }

  /* Disclaimer */
  .disclaimer {
    margin: 0;
    padding: 12px 0 16px;
    background: #3085ee;
    font-size: 12px;
    color: #f7f7f7;
    text-align: center;
    line-height: 1.5;
  }
  .disclaimer .footer-inner {
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 16px;
  }



/* Remove container top margin when hero is present */
.container-lg:has(.hero) {
  margin-top: 0 !important;
  padding-top: 0 !important;
}

/* Hero header */
.hero {
  position: relative;
  min-height: 320px;
  background: url('https://forkless.com/user/pages/01.home/_hero/header8.png') center/cover;
  color: #fff;
  text-align: center;
  width: 100vw;
  margin-left: calc(-50vw + 50%);
  margin-bottom: 2rem;
}
.hero > div {
  position: absolute;
  bottom: 20%;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  padding: 0 1rem;
}
.hero h1 {
  color: #fff;
  font-size: 2.8rem;
  margin: 0 0 0.5rem;
  font-weight: 600;
  text-shadow: 0 2px 8px rgba(0,0,0,.5);
}
.hero p {
  color: rgba(255,255,255,.8);
  font-size: 1.2rem;
  max-width: 640px;
  margin: 0 auto;
  font-weight: 300;
}
@media (max-width: 600px) {
  .hero { min-height: 200px; padding: 3rem 1rem; }
  .hero h1 { font-size: 1.8rem; }
}

/* Keep script names on one line in tables */
.markdown-body table td:first-child a {
  white-space: nowrap;
}

/* Flow chart in fullscreen */
.flow-chart:fullscreen,
.flow-chart:-webkit-full-screen {
  background: #fafafa;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 100vw;
  height: 100vh;
}
.flow-chart:fullscreen .flow-exit-btn,
.flow-chart:-webkit-full-screen .flow-exit-btn {
  display: flex !important;
}
.flow-chart:fullscreen .flow-fs-header,
.flow-chart:-webkit-full-screen .flow-fs-header {
  display: block !important;
}
.flow-chart:fullscreen .flow-panzoom,
.flow-chart:-webkit-full-screen .flow-panzoom {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  overflow: hidden;
}
.flow-chart:fullscreen .flow-panzoom img,
.flow-chart:-webkit-full-screen .flow-panzoom img {
  max-width: 100%;
  max-height: 100%;
  width: auto;
  height: auto;
  object-fit: contain;
}
.flow-chart:fullscreen [data-action="fullscreen"],
.flow-chart:-webkit-full-screen [data-action="fullscreen"] {
  display: none !important;
}

/* Copy button on code blocks */
.code-wrap {
    position: relative;
  }
  .copy-btn {
    position: absolute;
    top: 6px;
    right: 6px;
    background: #d0cec8;
    color: #474747;
    border: none;
    padding: 4px 6px;
    font-size: 12px;
    border-radius: 4px;
    cursor: pointer;
    opacity: 0.4;
    transition: opacity 0.2s;
  }
  .code-wrap:hover .copy-btn {
    opacity: 1;
  }
  .copy-btn:hover {
    background: #c0beb8;
  }
  .copy-btn.copied {
    background: #7aaa7a;
    color: #fff;
  }
</style>

<script src="https://cdn.jsdelivr.net/npm/@panzoom/panzoom@4/dist/panzoom.min.js"></script>
<script>
document.addEventListener("DOMContentLoaded", function() {
  var siteH1 = document.querySelector("h1 a[href*='knowledge-base']");
  if (siteH1 && document.querySelector(".hero")) siteH1.closest("h1").style.display = "none";
  var panzooms = {};
  var panzoomElements = document.querySelectorAll(".flow-panzoom");
  panzoomElements.forEach(function(elem) {
    var pz = Panzoom(elem, { maxScale: 5, minScale: 1, contain: "outside" });
    panzooms[elem.className] = pz;
    elem.parentElement.querySelectorAll(".flow-btn").forEach(function(btn) {
      btn.addEventListener("click", function(e) {
        var action = btn.getAttribute("data-action");
        if (action === "zoom-in") pz.zoomIn();
        else if (action === "zoom-out") pz.zoomOut();
        else if (action === "reset") pz.reset();
        else if (action === "fullscreen") {
          elem.style.transform = "";
          elem.style.width = "";
          var container = elem.closest(".flow-chart");
          var fs = container.requestFullscreen || container.webkitRequestFullscreen;
          if (fs) fs.call(container);
        }
        else if (action === "exit-fullscreen") {
          var xfs = document.exitFullscreen || document.webkitExitFullscreen;
          if (xfs) xfs.call(document);
        }
        e.stopPropagation();
      });
    });
    elem.addEventListener("wheel", pz.zoomWithWheel);
  });
  function refitPanzooms() {
    Object.keys(panzooms).forEach(function(k) {
      window.dispatchEvent(new Event("resize"));
      panzooms[k].reset();
    });
  }
  document.addEventListener("fullscreenchange", function() {
    if (!document.fullscreenElement) setTimeout(refitPanzooms, 200);
  });
  document.addEventListener("webkitfullscreenchange", function() {
    if (!document.webkitFullscreenElement) setTimeout(refitPanzooms, 200);
  });
  document.querySelectorAll(".markdown-body pre").forEach(function(pre) {
    var wrap = document.createElement("div");
    wrap.className = "code-wrap";
    pre.parentNode.insertBefore(wrap, pre);
    wrap.appendChild(pre);

    var btn = document.createElement("button");
    btn.className = "copy-btn";
    btn.innerHTML = '<span class="material-icons" style="font-size:14px">content_copy</span>';
    wrap.appendChild(btn);

    btn.addEventListener("click", function() {
      var text = pre.textContent;
      navigator.clipboard.writeText(text).then(function() {
        btn.innerHTML = '<span class="material-icons" style="font-size:14px">check</span>';
        btn.classList.add("copied");
        setTimeout(function() {
          btn.innerHTML = '<span class="material-icons" style="font-size:14px">content_copy</span>';
          btn.classList.remove("copied");
        }, 2000);
      });
    });
  });
});

// Inject footer
document.addEventListener("DOMContentLoaded", function() {
  var main = document.querySelector(".markdown-body");
  if (!main) return;

  var footer = document.createElement("div");
  var d = new Date();
  var months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  var dateStr = months[d.getMonth()] + " " + d.getDate() + ", " + d.getFullYear();
  footer.innerHTML = '<footer class="site-footer"><div class="footer-inner"><span>forkless // sharing what works</span><span class="date"><em>Last updated ' + dateStr + '</em></span></div></footer><div class="disclaimer"><div class="footer-inner"><strong>DISCLAIMER:</strong> These guides are provided as-is, without warranty. Always back up your data before following instructions. You are responsible for your own machine. Not affiliated with any mentioned tools or companies.</div></div>';
  main.after(footer);
});
</script>
